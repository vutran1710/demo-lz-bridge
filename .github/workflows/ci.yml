name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: Contracts (forge build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: forge build
        working-directory: contracts
        run: forge build --sizes
      - name: forge test
        working-directory: contracts
        run: forge test -vvv

  worker:
    name: Worker (go build + vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false
      - name: go build
        working-directory: worker
        run: go build ./...
      - name: go vet
        working-directory: worker
        run: go vet ./...
      - name: go test
        working-directory: worker
        run: go test ./...

  typecheck:
    name: TS typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: typecheck
        run: pnpm --filter @bridge/tests exec tsc --noEmit

  integration:
    name: Protocol-core integration (vitest + anvil)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: build contracts
        run: pnpm run build:contracts
      - name: integration suite
        run: pnpm run test:integration
