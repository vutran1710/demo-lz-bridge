name: Acceptance (e2e + stress)

# The acceptance baseline is the program's ultimate Conformance/Acceptance gate.
# Green as of P3 (attestor worker), so it is now a blocking PR check.
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  acceptance:
    name: Acceptance (e2e + sad-paths + ring + stress)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: build contracts
        run: pnpm run build:contracts
      - name: build worker
        run: pnpm run build:worker
      - name: e2e
        run: pnpm run test:e2e
      - name: stress
        run: pnpm run test:stress
